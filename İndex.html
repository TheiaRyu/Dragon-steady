<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Steady Clothing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050403;
    --gold-1:#f6e6a8;
    --gold-2:#d4af37;
    --gold-3:#9c7a24;
    --gold-line: rgba(212,175,55,0.35);
    --ink:#e9e1c9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Montserrat', sans-serif;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:0 0 40px;
  }
  .hero-img{
    width:100%;
    display:block;
  }
  .content{
    padding:0 22px;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    margin:6px 0 22px;
    color:var(--gold-3);
  }
  .divider .line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-line), transparent);
  }
  .divider .dot{
    width:5px; height:5px;
    background:var(--gold-2);
    transform:rotate(45deg);
    flex-shrink:0;
  }

  /* Big primary CTA */
  .btn-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    width:100%;
    padding:18px 20px;
    border-radius:14px;
    text-decoration:none;
    margin-bottom:14px;
    transition:transform .15s ease;
  }
  .btn-row:active{ transform:scale(0.98); }

  .btn-primary{
    background:linear-gradient(180deg,#f6e6a8, #d4af37 45%, #a97a1f);
    color:#141005;
    box-shadow:0 8px 20px rgba(212,175,55,0.28);
  }
  .btn-outline{
    border:1px solid var(--gold-line);
    color:var(--gold-1);
    background:rgba(212,175,55,0.03);
  }

  .btn-left{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .btn-icon{
    width:26px; height:26px;
    flex-shrink:0;
  }
  .btn-primary .btn-icon svg{ stroke:#141005; }
  .btn-outline .btn-icon svg{ stroke:url(#iconGrad); }
  .btn-icon svg{
    width:100%; height:100%;
    fill:none;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .btn-label{
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:14.5px;
    letter-spacing:0.07em;
  }
  .btn-arrow{
    width:18px; height:18px;
    flex-shrink:0;
    opacity:0.75;
  }
  .btn-primary .btn-arrow svg{ stroke:#141005; }
  .btn-outline .btn-arrow svg{ stroke:var(--gold-1); }
  .btn-arrow svg{ width:100%; height:100%; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* Info strips (shipping / discount) */
  .info-strip{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    border:1px solid var(--gold-line);
    background:rgba(212,175,55,0.02);
    margin-bottom:14px;
  }
  .info-icon{
    width:38px; height:38px;
    flex-shrink:0;
    border:1px solid var(--gold-line);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .info-icon svg{
    width:19px; height:19px;
    fill:none;
    stroke:url(#iconGrad);
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .info-strip p{
    font-family:'Montserrat', sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.02em;
    color:var(--gold-1);
  }

  /* Social circles */
  .social-row{
    display:flex;
    justify-content:center;
    gap:22px;
    margin:20px 0 18px;
  }
  .social-circle{
    width:52px; height:52px;
    border:1px solid var(--gold-line);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    text-decoration:none;
    transition:transform .15s ease;
  }
  .social-circle:active{ transform:scale(0.94); }
  .social-circle svg{
    width:24px; height:24px;
    fill:none;
    stroke:url(#iconGrad);
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .footer{
    text-align:center;
    margin-top:6px;
    padding-top:18px;
    border-top:1px solid rgba(212,175,55,0.12);
  }
  .footer p{
    font-size:11px;
    color:#6b6046;
    letter-spacing:0.03em;
    line-height:1.7;
  }
</style>
</head>
